<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026년 6월 탕전실 생산계획 대시보드</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #111827;
      --panel-2: #0f172a;
      --line: #263244;
      --text: #eef4ff;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      letter-spacing: 0;
    }
    .app {
      width: min(1920px, 100vw);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
    }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button {
      border: 1px solid #334155;
      background: #172033;
      color: var(--text);
      min-height: 38px;
      padding: 0 12px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }
    button.active { background: #0e7490; border-color: #22d3ee; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .kpi {
      padding: 14px 16px;
      min-height: 82px;
    }
    .kpi span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .kpi strong {
      font-size: 28px;
      line-height: 1;
    }
    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(900px, 1fr) 360px;
      gap: 16px;
    }
    .calendar {
      display: grid;
      grid-template-rows: auto repeat(5, auto);
      gap: 8px;
      min-height: 0;
    }
    .weekdays, .week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }
    .weekday {
      color: #dbeafe;
      background: #122036;
      border: 1px solid #23324a;
      border-radius: 6px;
      text-align: center;
      padding: 8px 4px;
      font-weight: 800;
      font-size: 15px;
    }
    .day {
      position: relative;
      overflow: visible;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 8px 8px;
      min-height: 118px;
    }
    .day.weekend { background: #111e31; }
    .day.empty { opacity: .38; }
    .day-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      min-height: 24px;
      margin-bottom: 6px;
    }
    .date {
      font-size: 22px;
      font-weight: 900;
    }
    .note {
      color: #facc15;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .events {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .event {
      border-left: 4px solid var(--event-color);
      background: color-mix(in srgb, var(--event-color) 20%, #111827);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
      line-height: 1.25;
      color: #f8fafc;
      overflow-wrap: anywhere;
    }
    .event small {
      display: block;
      color: #cbd5e1;
      font-size: 11px;
      margin-bottom: 1px;
      font-weight: 800;
    }
    .more {
      color: var(--muted);
      font-size: 12px;
      padding: 2px 2px 0;
    }
    .side {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .panel {
      padding: 14px;
      min-width: 0;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 17px;
    }
    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

      display: flex;
      align-items: center;
      gap: 7px;
