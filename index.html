<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026년 6월 탕전실 생산계획 대시보드</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #111827;
      --panel-2: #0f172a;
      --line: #263244;
      --text: #eef4ff;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      letter-spacing: 0;
    }
    .app {
      width: min(1920px, 100vw);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
    }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button {
      border: 1px solid #334155;
      background: #172033;
      color: var(--text);
      min-height: 38px;
      padding: 0 12px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }
    button.active { background: #0e7490; border-color: #22d3ee; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .kpi {
      padding: 14px 16px;
      min-height: 82px;
    }
    .kpi span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .kpi strong {
      font-size: 28px;
      line-height: 1;
    }
    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(900px, 1fr) 360px;
      gap: 16px;
    }
    .calendar {
      display: grid;
      grid-template-rows: auto repeat(5, minmax(118px, 1fr));
      gap: 8px;
      min-height: 700px;
    }
    .weekdays, .week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }
    .weekday {
      color: #dbeafe;
      background: #122036;
      border: 1px solid #23324a;
      border-radius: 6px;
      text-align: center;
      padding: 8px 4px;
      font-weight: 800;
      font-size: 15px;
    }
    .day {
      position: relative;
      overflow: hidden;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 8px 8px;
      min-height: 118px;
    }
    .day.weekend { background: #111e31; }
    .day.empty { opacity: .38; }
    .day-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      min-height: 24px;
      margin-bottom: 6px;
    }
    .date {
      font-size: 22px;
      font-weight: 900;
    }
    .note {
      color: #facc15;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .events {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .event {
      border-left: 4px solid var(--event-color);
      background: color-mix(in srgb, var(--event-color) 20%, #111827);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
      line-height: 1.25;
      color: #f8fafc;
      overflow-wrap: anywhere;
    }
    .event small {
      display: block;
      color: #cbd5e1;
      font-size: 11px;
      margin-bottom: 1px;
      font-weight: 800;
    }
    .more {
      color: var(--muted);
      font-size: 12px;
      padding: 2px 2px 0;
    }
    .side {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .panel {
      padding: 14px;
      min-width: 0;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 17px;
    }
    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #dbeafe;
      min-width: 0;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--swatch);
      flex: 0 0 auto;
    }
    .bars {
      display: grid;
      gap: 8px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 86px 1fr 34px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .track {
      height: 9px;
      border-radius: 99px;
      background: #1f2937;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: var(--bar-color, var(--accent));
      border-radius: inherit;
    }
    .details-list {
      overflow: auto;
      max-height: 330px;
      padding-right: 4px;
      display: grid;
      gap: 7px;
    }
    .detail-item {
      border: 1px solid #253045;
      background: #0b1322;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      line-height: 1.35;
    }
    .detail-item b {
      color: #bfdbfe;
    }
    @media (max-width: 1100px) {
      .app { padding: 14px; }
      header, .main { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .calendar { min-height: 0; }
      .week { grid-template-columns: 1fr; }
      .weekdays { display: none; }
      .day.empty { display: none; }
    }
    @media print {
      body { background: #07111f; }
      .app { width: 1920px; height: 1080px; overflow: hidden; }
      button { display: none; }
    }
    </style>

    const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
    const processColors = Object.fromEntries(DATA.legend.map(item => [item.label, item.color]));

    function buildCalendar(maxEvents = 5) {
      const cal = document.querySelector(".calendar");
      cal.innerHTML = "";
      const head = document.createElement("div");
      head.className = "weekdays";
      weekdays.forEach(w => {
        const el = document.createElement("div");
        el.className = "weekday";
        el.textContent = w;
        head.appendChild(el);
      });
      cal.appendChild(head);

      const cells = [];
      const firstWeekday = 1;
      for (let i = 0; i < firstWeekday; i++) cells.push(null);
      DATA.days.forEach(day => cells.push(day));
      while (cells.length % 7) cells.push(null);

      for (let w = 0; w < cells.length / 7; w++) {
        const week = document.createElement("div");
        week.className = "week";
        cells.slice(w * 7, w * 7 + 7).forEach((day, index) => {
          const cell = document.createElement("section");
          cell.className = "day" + (!day ? " empty" : "") + (index === 0 || index === 6 ? " weekend" : "");
          if (!day) {
            week.appendChild(cell);
            return;
          }
          const visible = day.events.slice(0, maxEvents);
          const note = day.notes.length ? day.notes.join(", ") : "";
          cell.innerHTML = `
            <div class="day-head">
              <div class="date">${day.day}</div>
              <div class="note" title="${escapeHtml(note)}">${escapeHtml(note)}</div>
            </div>
            <div class="events">
              ${visible.map(event => `
                <div class="event" style="--event-color:${event.color}">
                  <small>${escapeHtml(event.process)}</small>${escapeHtml(event.text)}
                </div>`).join("")}
              ${day.events.length > maxEvents ? `<div class="more">+ ${day.events.length - maxEvents}건 더 있음</div>` : ""}
            </div>
          `;
          week.appendChild(cell);
        });
        cal.appendChild(week);
      }
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function buildBars() {
      const processBox = document.querySelector("#process-bars");
      const entries = Object.entries(DATA.processCounts).sort((a, b) => b[1] - a[1]);
      const max = Math.max(...entries.map(item => item[1]), 1);
      processBox.innerHTML = entries.map(([name, count]) => `
        <div class="bar-row">
          <span>${escapeHtml(name)}</span>
          <div class="track"><div class="fill" style="width:${count / max * 100}%;--bar-color:${processColors[name] || "#38bdf8"}"></div></div>
          <b>${count}</b>
        </div>
      `).join("");

      const loadBox = document.querySelector("#load-bars");
      const loadEntries = Object.entries(DATA.loadCounts).sort((a, b) => Number(a[0]) - Number(b[0]));
      const loadMax = Math.max(...loadEntries.map(item => item[1]), 1);
      loadBox.innerHTML = loadEntries.map(([day, count]) => `
        <div class="bar-row">
          <span>${day}일</span>
          <div class="track"><div class="fill" style="width:${count / loadMax * 100}%"></div></div>
          <b>${count}</b>
        </div>
      `).join("");
    }

    function buildDetails() {
      const list = document.querySelector("#details");
      const events = DATA.days.flatMap(day => day.events.map(event => ({...event, day: day.day})));
      list.innerHTML = events.slice(0, 70).map(event => `
        <div class="detail-item">
          <b>${event.day}일 · ${escapeHtml(event.process)}</b><br>
          ${escapeHtml(event.text)}<br>
          <span style="color:#94a3b8">${escapeHtml(event.source)}</span>
        </div>
      `).join("");
    }

    function init() {
      document.querySelector("#total").textContent = DATA.summary.totalEvents;
      document.querySelector("#active").textContent = DATA.summary.activeDays;
      document.querySelector("#cip").textContent = DATA.summary.cipCount;
      document.querySelector("#package").textContent = DATA.summary.packageCount;
      document.querySelector("#peak").textContent = `${DATA.summary.peakDay}일`;
      document.querySelector("#legend").innerHTML = DATA.legend.map(item => `
        <div class="legend-item"><i class="swatch" style="--swatch:${item.color}"></i><span>${escapeHtml(item.label)}</span></div>
      `).join("");
      buildCalendar(5);
      buildBars();
      buildDetails();
      document.querySelector("#tv").addEventListener("click", () => {
        document.querySelectorAll(".header-actions button").forEach(btn => btn.classList.remove("active"));
        document.querySelector("#tv").classList.add("active");
        buildCalendar(3);
      });
      document.querySelector("#full").addEventListener("click", () => {
        document.querySelectorAll(".header-actions button").forEach(btn => btn.classList.remove("active"));
        document.querySelector("#full").classList.add("active");
        buildCalendar(5);
      });
    }
    init();
    </script>
